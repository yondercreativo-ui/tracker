<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finanzas</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0b1220;
      color: white;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #1a2236;
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 20px;
    }

    input, select {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: none;
      margin-bottom: 10px;
      font-size: 16px;
      background: #2a344a;
      color: white;
    }

    button {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: none;
      background: #4ade80;
      font-weight: bold;
      cursor: pointer;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .logout {
      background: #ff4d4d;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="topbar">
    <div id="userEmail"></div>
    <div class="logout" onclick="logout()">Salir</div>
  </div>

  <div class="card">
    <h2>Disponible</h2>
    <h1 id="balance">$0</h1>
  </div>

  <div class="card">
    <h3>Agregar movimiento</h3>

    <!-- 🔥 INPUT FIX iPhone -->
    <input 
      type="text"
      inputmode="decimal"
      id="amount"
      placeholder="Monto (ej: 2,50)"
    />

    <select id="type">
      <option value="income">Ingreso</option>
      <option value="expense">Gasto</option>
    </select>

    <button onclick="addMovement()">Agregar</button>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { 
    getAuth, 
    GoogleAuthProvider, 
    signInWithPopup, 
    signOut,
    onAuthStateChanged 
  } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

  import { 
    getFirestore, 
    collection, 
    addDoc, 
    onSnapshot 
  } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

  // 🔥 TU CONFIG REAL
  const firebaseConfig = {
    apiKey: "AIzaSyBGDX1o8OQWT0ZsXjE9wUoIdT4_IJWPy7U",
    authDomain: "app-de-finanzas-c32c3.firebaseapp.com",
    projectId: "app-de-finanzas-c32c3",
    storageBucket: "app-de-finanzas-c32c3.firebasestorage.app",
    messagingSenderId: "1039404017745",
    appId: "1:1039404017745:web:c73c91b0f612327ad7f070",
    measurementId: "G-8JP4PWWZN1"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let userId = null;

  // 🔥 LIMPIAR INPUT
  const amountInput = document.getElementById("amount");

  amountInput.addEventListener("input", (e) => {
    e.target.value = e.target.value.replace(/[^0-9.,]/g, '');
  });

  function parseAmount(value) {
    return parseFloat(value.replace(',', '.')) || 0;
  }

  // 🔥 LOGIN
  const provider = new GoogleAuthProvider();

  window.login = async () => {
    await signInWithPopup(auth, provider);
  };

  // 🔥 LOGOUT
  window.logout = async () => {
    await signOut(auth);
    location.reload();
  };

  // 🔥 AGREGAR MOVIMIENTO
  window.addMovement = async () => {
    const raw = amountInput.value;
    const amount = parseAmount(raw);
    const type = document.getElementById("type").value;

    if (!amount || !userId) return;

    await addDoc(collection(db, "users", userId, "movements"), {
      amount,
      type,
      createdAt: Date.now()
    });

    amountInput.value = "";
  };

  // 🔥 AUTH + REALTIME
  onAuthStateChanged(auth, (user) => {
    if (!user) {
      document.body.innerHTML = `
        <div style="display:flex;align-items:center;justify-content:center;height:100vh;">
          <button onclick="login()" style="padding:20px;font-size:18px;">
            Iniciar con Google
          </button>
        </div>
      `;
      return;
    }

    userId = user.uid;

    document.getElementById("userEmail").innerText = user.email;

    const ref = collection(db, "users", userId, "movements");

    onSnapshot(ref, (snapshot) => {
      let total = 0;

      snapshot.forEach(doc => {
        const data = doc.data();
        total += data.type === "income" ? data.amount : -data.amount;
      });

      document.getElementById("balance").innerText = "$" + total.toFixed(2);
    });
  });

</script>

</body>
</html>
