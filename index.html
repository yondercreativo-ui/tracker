<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanzas</title>

<style>
body{
  margin:0;
  font-family: system-ui;
  background:#0b0f1a;
  color:white;
}

/* LOGIN */
.auth-page{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
.auth-card{
  background:#151a27;
  padding:24px;
  border-radius:20px;
  text-align:center;
  width:90%;
  max-width:400px;
}
button{
  padding:14px;
  border:none;
  border-radius:12px;
  width:100%;
  margin-top:16px;
  font-weight:bold;
  cursor:pointer;
}

/* APP */
.container{
  padding:20px;
}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore-compat.js"></script>

</head>

<body>

<!-- LOGIN -->
<div id="authPage" class="auth-page">
  <div class="auth-card">
    <h1>Finanzas</h1>
    <p>Inicia sesión para guardar tu información</p>
    <button onclick="loginWithGoogle()">Continuar con Google</button>
  </div>
</div>

<!-- APP -->
<div id="appShell" style="display:none" class="container">
  <h1>Bienvenido</h1>
  <p id="userEmail"></p>
  <button onclick="logout()">Cerrar sesión</button>
</div>

<script>

// 🔥 CONFIG FIREBASE (YA TIENES ESTO)
const firebaseConfig = {
  apiKey: "AIzaSyBGDX1o8OQWT0ZsXjE9wUoIdT4_IJWPy7U",
  authDomain: "app-de-finanzas-c32c3.firebaseapp.com",
  projectId: "app-de-finanzas-c32c3",
  storageBucket: "app-de-finanzas-c32c3.appspot.com",
  messagingSenderId: "1039404017745",
  appId: "1:1039404017745:web:c73c91b0f612327ad7f070"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();
const db = firebase.firestore();

let currentUser = null;


// 🔥 LOGIN (FIX)
function loginWithGoogle(){
  auth.signInWithRedirect(provider);
}


// 🔥 RETORNO LOGIN (CLAVE)
auth.getRedirectResult()
  .then((result) => {
    if (result.user) {
      console.log("Login OK");
    }
  })
  .catch((error) => {
    console.error("Error login:", error);
  });


// 🔥 DETECTAR USUARIO
auth.onAuthStateChanged(async (user)=>{
  if(user){
    currentUser = user;

    document.getElementById("authPage").style.display = "none";
    document.getElementById("appShell").style.display = "block";
    document.getElementById("userEmail").textContent = user.email;

    await loadUserData();

  } else {
    currentUser = null;

    document.getElementById("authPage").style.display = "flex";
    document.getElementById("appShell").style.display = "none";
  }
});


// 🔥 LOGOUT
function logout(){
  auth.signOut();
}


// 🔥 FIRESTORE BASE
async function loadUserData(){
  const ref = db.collection("users").doc(currentUser.uid);
  const snap = await ref.get();

  if(!snap.exists){
    await ref.set({
      createdAt: new Date()
    });
  }
}

</script>

</body>
</html>
