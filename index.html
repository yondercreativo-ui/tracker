<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanzas</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b0f1a;
  color:white;
}

/* LOGIN */
#authPage{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#121826;
  padding:40px;
  border-radius:20px;
  text-align:center;
  width:300px;
}

/* APP */
#appShell{
  display:none;
  padding:20px;
}

/* HEADER */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

/* BLOQUES */
.box{
  background:#121826;
  padding:20px;
  border-radius:16px;
  margin-bottom:16px;
}

input, select{
  width:100%;
  padding:12px;
  margin-top:8px;
  margin-bottom:12px;
  border-radius:10px;
  border:none;
  background:#1b2236;
  color:white;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="authPage">
  <div class="card">
    <h1>Finanzas</h1>
    <p>Inicia sesión para guardar tu información</p>
    <button id="loginBtn">Continuar con Google</button>
  </div>
</div>

<!-- APP -->
<div id="appShell">

  <!-- HEADER -->
  <div class="topbar">
    <h2 id="titleEditable" contenteditable="true">Finanzas Yonder</h2>
    <span id="userEmail"></span>
    <button id="logoutBtn">Salir</button>
  </div>

  <!-- AGREGAR MOVIMIENTO -->
  <div class="box">
    <h3>Nuevo movimiento</h3>
    <input id="amount" placeholder="Monto">
    <select id="type">
      <option>Gasto</option>
      <option>Ingreso</option>
      <option>Ahorro</option>
      <option>Inversión</option>
    </select>
    <input id="desc" placeholder="Descripción">
    <button onclick="addMovement()">Guardar</button>
  </div>

  <!-- LISTA -->
  <div class="box">
    <h3>Movimientos</h3>
    <div id="list"></div>
  </div>

</div>

<!-- 🔥 FIREBASE COMPAT -->
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBGDX1o8OQWT0ZsXjE9wUoIdT4_IJWPy7U",
  authDomain: "app-de-finanzas-c32c3.firebaseapp.com",
  projectId: "app-de-finanzas-c32c3",
  storageBucket: "app-de-finanzas-c32c3.firebasestorage.app",
  messagingSenderId: "1039404017745",
  appId: "1:1039404017745:web:c73c91b0f612327ad7f070"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

let movements = [];

/* LOGIN */
document.getElementById("loginBtn").onclick = async ()=>{
  try{
    await auth.signInWithPopup(provider);
  }catch(e){
    console.error(e);
    alert("Error login");
  }
};

/* LOGOUT */
document.getElementById("logoutBtn").onclick = async ()=>{
  await auth.signOut();
};

/* SESIÓN */
auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("authPage").style.display = "none";
    document.getElementById("appShell").style.display = "block";
    document.getElementById("userEmail").textContent = user.email;
  } else {
    document.getElementById("authPage").style.display = "flex";
    document.getElementById("appShell").style.display = "none";
  }
});

/* APP FUNCIONAL */
function addMovement(){
  const amount = document.getElementById("amount").value;
  const type = document.getElementById("type").value;
  const desc = document.getElementById("desc").value;

  if(!amount || !desc) return;

  movements.unshift({
    amount,
    type,
    desc,
    date: new Date().toLocaleString()
  });

  render();
}

function render(){
  const list = document.getElementById("list");
  list.innerHTML = "";

  movements.slice(0,5).forEach((m,i)=>{
    list.innerHTML += `
      <div style="padding:10px 0;border-bottom:1px solid #222;">
        <b contenteditable="true">${m.desc}</b><br>
        <small>${m.type} • ${m.date}</small>
        <span style="float:right">$${m.amount}</span>
        <button onclick="deleteMovement(${i})">❌</button>
      </div>
    `;
  });
}

function deleteMovement(i){
  movements.splice(i,1);
  render();
}
</script>

</body>
</html>
