<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Finanzas Yonder V10</title>
<style>
:root{
  --bg:#0f1115; --card:#1a1d24; --field:#2a2f38; --line:#343946;
  --text:#ffffff; --muted:#a7abb5; --green:#00d26a; --yellow:#ffd400; --red:#ff4d4f; --blue:#4da3ff;
}
*{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;background:var(--bg);color:var(--text);margin:0;padding:20px 20px 90px}
.container{max-width:430px;margin:auto}
.page{display:none}.page.active{display:block}
h1{font-size:26px;margin:0 0 16px}
.card{background:var(--card);padding:16px;border-radius:18px;margin-bottom:12px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.amount{font-size:24px;font-weight:800;margin-top:4px}
.label{color:var(--muted);font-size:13px}
.green{color:var(--green)}.yellow{color:var(--yellow)}.red{color:var(--red)}.blue{color:var(--blue)}
input,select{width:100%;padding:14px;margin-top:10px;border-radius:13px;border:none;background:var(--field);color:#fff;font-size:16px}
button{width:100%;padding:14px;margin-top:10px;border-radius:13px;border:none;background:#fff;color:#000;font-weight:800;font-size:16px;cursor:pointer}
.danger{background:var(--red);color:#fff}
.ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
.item{border-bottom:1px solid var(--line);padding:10px 0;font-size:14px}
.item:last-child{border-bottom:0}

.row{display:flex;justify-content:space-between;align-items:center;gap:8px}
.row > div{display:flex;align-items:center;gap:8px}

.small{font-size:12px;color:var(--muted);margin-top:3px}
.progress{height:8px;background:#303542;border-radius:50px;overflow:hidden;margin-top:8px}
.bar{height:100%;width:0%;border-radius:50px;background:var(--green)}
.bar.yellow{background:var(--yellow)}.bar.red{background:var(--red)}
.nav{position:fixed;left:0;right:0;bottom:0;background:#151821;border-top:1px solid #262b36;display:flex;z-index:10}
.nav button{background:transparent;color:var(--muted);border-radius:0;margin:0;padding:14px 4px;font-size:12px}
.nav button.active{color:white}
.empty{color:var(--muted);font-size:14px;padding:8px 0}

.edit-btn{
  background:transparent;
  border:none;
  color:var(--muted);
  font-size:14px;
  cursor:pointer;
  margin-left:8px;
}

.editable{cursor:pointer}
</style>
</head>
<body>

<div id="authPage" style="position:fixed;inset:0;background:#0f1115;display:flex;justify-content:center;align-items:center;z-index:9999;">
  <div style="background:#1a1d24;padding:24px;border-radius:18px;text-align:center;max-width:320px;margin:20px;">
    <h1>Finanzas</h1>
    <p class="small">Inicia sesión para guardar tu información en la nube.</p>
    <button id="loginBtn">Continuar con Google</button>
  </div>
</div>

<div id="homePage" class="container page active">
<h1 id="appTitle" onclick="editTitle()" style="cursor:pointer">Finanzas Yonder</h1>
<input id="titleInput" style="display:none;font-size:26px;font-weight:800;background:transparent;border:none;color:white;width:100%" />
</div>

<div id="budgetsPage" class="container page">
  <h1>Presupuestos</h1>
  <div class="card">
    <strong>Categorías creadas</strong>
    <div id="budgetList"></div>
  </div>
</div>

<script>
let transactions = [];
let budgetData = {Comida:180,dopamina:100,comida:200};
let editingCategory = null;

function money(n){return "$"+n}
function saveAll(){console.log("saved")}
function parseAmount(v){return parseFloat(v||0)}

function startEditCategory(cat){
  editingCategory = cat;
  renderAll();
}

function deleteBudget(cat){
  if(!confirm("¿Eliminar este presupuesto?")) return;
  delete budgetData[cat];
  transactions = transactions.filter(t => t.category !== cat);
  editingCategory = null;
  saveAll();
  renderAll();
}

/* === FIX iPhone === */
function renderBudgets(){
  const box = document.getElementById("budgetList");
  box.innerHTML = "";

  Object.keys(budgetData).forEach(cat=>{
    const item = document.createElement("div");
    item.className = "item";

    if(editingCategory === cat){

      const row = document.createElement("div");
      row.className = "row";

      const nameInput = document.createElement("input");
      nameInput.value = cat;

      const amountInput = document.createElement("input");
      amountInput.value = budgetData[cat];
      amountInput.setAttribute("inputmode","decimal");

      row.appendChild(nameInput);
      row.appendChild(amountInput);

      const saveBtn = document.createElement("button");
      saveBtn.textContent = "Guardar";
      saveBtn.onclick = () => {
        const newName = nameInput.value.trim();
        const newAmount = parseAmount(amountInput.value);
        delete budgetData[cat];
        budgetData[newName] = newAmount;
        editingCategory = null;
        saveAll();
        renderAll();
      };

      const deleteBtn = document.createElement("button");
      deleteBtn.textContent = "Eliminar";
      deleteBtn.className = "danger";
      deleteBtn.onclick = () => deleteBudget(cat);

      const cancelBtn = document.createElement("button");
      cancelBtn.textContent = "Cancelar";
      cancelBtn.className = "ghost";
      cancelBtn.onclick = () => {
        editingCategory = null;
        renderAll();
      };

      item.appendChild(row);
      item.appendChild(saveBtn);
      item.appendChild(deleteBtn);
      item.appendChild(cancelBtn);

    } else {

      const row = document.createElement("div");
      row.className = "row";

      const left = document.createElement("strong");
      left.textContent = cat;

      const right = document.createElement("div");

      const amount = document.createElement("strong");
      amount.textContent = money(budgetData[cat]);

      const editBtn = document.createElement("button");
      editBtn.className = "edit-btn";
      editBtn.textContent = "✏️";
      editBtn.onclick = () => startEditCategory(cat);

      right.appendChild(amount);
      right.appendChild(editBtn);

      row.appendChild(left);
      row.appendChild(right);
      item.appendChild(row);
    }

    box.appendChild(item);
  });
}

function renderAll(){
  renderBudgets();
}

renderAll();
</script>
</body>
</html>
