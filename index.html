<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanzas</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b0f1a;
  color:white;
}

/* LOGIN */
#authPage{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#121826;
  padding:40px;
  border-radius:20px;
  text-align:center;
  width:300px;
}

button{
  padding:14px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

/* APP */
#appShell{
  display:none;
  padding:20px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="authPage">
  <div class="card">
    <h1>Finanzas</h1>
    <p>Inicia sesión para guardar tu información</p>
    <button id="loginBtn">Continuar con Google</button>
  </div>
</div>

<!-- APP -->
<div id="appShell">
  <div class="topbar">
    <h2>Bienvenido</h2>
    <span id="userEmail"></span>
    <button id="logoutBtn">Salir</button>
  </div>

  <h3>Tu app está funcionando 🚀</h3>
</div>

<!-- 🔥 FIREBASE (VERSIÓN COMPAT = FIX DEL BUG) -->
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBGDX1o8OQWT0ZsXjE9wUoIdT4_IJWPy7U",
  authDomain: "app-de-finanzas-c32c3.firebaseapp.com",
  projectId: "app-de-finanzas-c32c3",
  storageBucket: "app-de-finanzas-c32c3.firebasestorage.app",
  messagingSenderId: "1039404017745",
  appId: "1:1039404017745:web:c73c91b0f612327ad7f070"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

/* LOGIN */
document.getElementById("loginBtn").onclick = async ()=>{
  try{
    await auth.signInWithPopup(provider);
  }catch(e){
    console.error(e);
    alert("Error iniciando sesión");
  }
};

/* LOGOUT */
document.getElementById("logoutBtn").onclick = async ()=>{
  await auth.signOut();
};

/* 🔥 CONTROL DE SESIÓN (ESTO YA FUNCIONA) */
auth.onAuthStateChanged(user=>{
  console.log("USER:", user);

  if(user){
    document.getElementById("authPage").style.display = "none";
    document.getElementById("appShell").style.display = "block";
    document.getElementById("userEmail").textContent = user.email;
  } else {
    document.getElementById("authPage").style.display = "flex";
    document.getElementById("appShell").style.display = "none";
  }
});
</script>

</body>
</html>
